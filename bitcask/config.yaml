# Bitcask 配置文件

# 数据存储相关配置
storage:
  # 数据文件目录
  data_dir: "./data"
  # 最大数据文件大小（字节）
  max_file_size: 1073741824  # 1GB
  # 是否启用压缩
  enable_compression: false
  # 压缩阈值（字节）
  compression_threshold: 1024  # 1KB

# WAL相关配置
wal:
  # WAL文件目录
  wal_dir: "./wal"
  # 单个WAL文件最大大小（字节）
  max_wal_size: 67108864  # 64MB
  # WAL同步策略: always, periodic, none
  sync_strategy: "always"
  # 如果sync_strategy为periodic，同步间隔（秒）
  sync_interval: 1.0
  # WAL保留时间（小时）
  retention_hours: 24
  # 是否在启动时自动恢复
  auto_recovery: true

# B-tree索引配置
btree:
  # 是否启用内存缓存
  enable_cache: true
  # 最大缓存大小（条目数）
  max_cache_size: 1000000
  # 缓存驱逐策略: lru, fifo
  cache_eviction: "lru"

# 事务配置
transaction:
  # 事务超时时间（秒）
  timeout: 30
  # 最大重试次数
  max_retries: 3
  # 隔离级别: read_uncommitted, read_committed, repeatable_read, serializable
  isolation_level: "repeatable_read"

# 性能调优
performance:
  # 后台压缩间隔（小时）
  compaction_interval: 6
  # 读取缓冲区大小（字节）
  read_buffer_size: 65536  # 64KB
  # 写入缓冲区大小（字节）
  write_buffer_size: 65536  # 64KB
  # 是否启用预读
  enable_prefetch: true
  # 预读大小（字节）
  prefetch_size: 131072  # 128KB

# 监控和日志
monitoring:
  # 日志级别: debug, info, warning, error
  log_level: "info"
  # 是否启用指标收集
  enable_metrics: true
  # 指标收集间隔（秒）
  metrics_interval: 60
  # 是否启用慢查询日志
  slow_query_log: true
  # 慢查询阈值（毫秒）
  slow_query_threshold: 100
